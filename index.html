            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH "PRAISE MATRIX"</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #030201; color: #ffffff; font-family: system-ui, sans-serif; }
        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        .matrix-card { background: rgba(18, 18, 18, 0.6); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 12px; transition: all 0.2s; }
        .matrix-card:hover { border-color: #cc5a01; transform: translateY(-2px); }
        .audio-preview-box { background: linear-gradient(135deg, #111, #222); height: 80px; border-radius: 8px 8px 0 0; position: relative; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        audio { filter: sepia(50%) invert(92%); }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="border-b border-white/5 bg-black/80 sticky top-0 z-50 px-6 py-3 flex justify-between items-center">
        <div class="mx-auto text-xs font-bold tracking-widest text-gray-400 uppercase">
            <i class="fa-solid fa-cross text-burnt-orange mr-1"></i> MAXWELL'S <span class="text-gold">JUDAH "PRAISE MATRIX"</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <section class="mb-8 text-center">
            <h1 class="text-2xl font-black mb-1 uppercase tracking-tight">JUDAH <span class="text-burnt-orange">"PRAISE MATRIX"</span></h1>
            <p class="text-gray-400 text-[11px]">Scanning decentralized databases. Music downloads map instantly with real titles.</p>
        </section>

        <section class="mb-8 max-w-xl mx-auto">
            <div class="bg-zinc-900/90 border border-white/10 rounded-full p-1 flex items-center shadow-xl">
                <div class="flex-1 flex items-center px-4">
                    <i class="fa-solid fa-fire text-burnt-orange mr-2 animate-pulse"></i>
                    <input type="text" id="search-input" placeholder="Type exact song name, choir, or artist..." class="w-full bg-transparent text-white focus:outline-none text-xs">
                </div>
                <button type="button" id="search-submit-btn" class="bg-burnt-orange hover:bg-orange-700 text-white font-bold px-5 py-2 rounded-full text-[10px] uppercase tracking-wider transition">Search</button>
            </div>
        </section>

        <section class="mb-4 px-1">
            <h2 id="grid-context-title" class="text-[11px] font-bold uppercase tracking-widest text-gold flex items-center gap-2">
                <i class="fa-solid fa-magnifying-glass text-xs"></i> Ready for input
            </h2>
        </section>

        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-t-transparent border-burnt-orange mb-3"></div>
            <p class="text-[10px] tracking-widest text-gold uppercase">Aligning Algorithm Matrix...</p>
        </div>

        <div id="no-results" class="hidden text-center py-12 bg-zinc-900/30 rounded-xl max-w-md mx-auto p-6 border border-white/5">
            <p class="text-gray-400 text-xs">No full audio files matched this sequence. Broaden your keywords!</p>
        </div>

        <div id="results-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
    </main>

    <footer id="audio-player-container" class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/10 p-3 hidden z-50 shadow-2xl backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
            <div class="flex items-center gap-2 w-full sm:w-1/3 min-w-0">
                <div class="p-2 bg-zinc-900 rounded-lg text-burnt-orange"><i class="fa-solid fa-music text-xs animate-bounce"></i></div>
                <div class="truncate">
                    <h4 id="player-track-name" class="font-bold text-[11px] truncate text-white">Song</h4>
                    <p id="player-track-artist" class="text-[9px] text-gold truncate">Artist</p>
                </div>
            </div>
            <div class="w-full sm:w-1/3 flex justify-center"><audio id="main-audio-element" controls class="w-full h-8"></audio></div>
            <div class="w-full sm:w-1/3 flex justify-end">
                <button id="player-download-btn" class="w-full sm:w-auto bg-burnt-orange hover:bg-orange-700 text-white text-[10px] font-bold px-4 py-2 rounded-lg flex items-center justify-center gap-1 uppercase tracking-wider"><i class="fa-solid fa-cloud-arrow-down"></i> Download Payload</button>
            </div>
        </div>
    </footer>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchSubmitBtn = document.getElementById('search-submit-btn');
        const resultsGrid = document.getElementById('results-grid');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('no-results');
        const gridContextTitle = document.getElementById('grid-context-title');
        const playerContainer = document.getElementById('audio-player-container');
        const mainAudio = document.getElementById('main-audio-element');
        const playerName = document.getElementById('player-track-name');
        const playerArtist = document.getElementById('player-track-artist');
        const playerDownloadBtn = document.getElementById('player-download-btn');

        let curUrl = '', curTitle = '', curArtist = '';

        // Auto-loads original beautiful dashboard state with valid track data
        window.addEventListener('DOMContentLoaded', () => {
            executeMatrixDataExtraction("Zoravo"); 
        });

        async function triggerSearch() {
            let query = searchInput.value.trim();
            if (!query) return;
            
            if(query.toLowerCase().includes("ayala")) {
                query = query.toLowerCase().replace("ayala", "").trim();
            }

            gridContextTitle.textContent = `Search Results: "${query.toUpperCase()}"`;
            resultsGrid.innerHTML = '';
            noResults.classList.add('hidden');
            loading.classList.remove('hidden');
            await executeMatrixDataExtraction(query);
        }

        searchSubmitBtn.addEventListener('click', triggerSearch);
        searchInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') triggerSearch(); });

        async function executeMatrixDataExtraction(queryString) {
            try {
                loading.classList.remove('hidden');
                noResults.classList.add('hidden');
                
                let cleanQuery = encodeURIComponent(queryString.trim());
                const filterRules = `mediatype:(audio) AND -subject:(podcast) AND -subject:(poem) AND -subject:(poetry) AND -collection:(opensource_audio_books)`;
                
                let url = `https://archive.org/advancedsearch.php?q=(title:(${cleanQuery}) OR creator:(${cleanQuery})) AND ${filterRules}&fl[]=identifier,title,creator&sort[]=downloads+desc&output=json&rows=24`;
                
                let res = await fetch(url);
                let data = await res.json();
                let items = data.response.docs;

                if (!items || items.length === 0) {
                    let words = queryString.split(/\s+/);
                    if (words.length > 1) {
                        let primaryWord = encodeURIComponent(words[words.length - 1]);
                        let fallbackUrl = `https://archive.org/advancedsearch.php?q=(title:(${primaryWord}) OR creator:(${primaryWord})) AND ${filterRules}&fl[]=identifier,title,creator&sort[]=downloads+desc&output=json&rows=16`;
                        res = await fetch(fallbackUrl);
                        data = await res.json();
                        items = data.response.docs;
                    }
                }

                loading.classList.add('hidden');
                resultsGrid.innerHTML = '';

                if (!items || items.length === 0) {
                    noResults.classList.remove('hidden');
                    return;
                }

                let rendered = 0;

                for (let item of items) {
                    let title = item.title || "Unmapped Track";
                    let artist = item.creator || "JUDAH Matrix Unit";
                    let tLow = title.toLowerCase();
                    
                    if (tLow.includes("episode") || tLow.includes("concert") || tLow.includes("forum") || tLow.includes("various")) continue;

                    try {
                        let metaRes = await fetch(`https://archive.org/metadata/${item.identifier}`);
                        let metaData = await metaRes.json();
                        let file = metaData.files.find(f => f.name.endsWith('.mp3') && !f.name.includes('vbr') && parseFloat(f.size) > 1000000);
                        
                        if (file) {
                            rendered++;
                            let dUrl = `https://archive.org/download/${item.identifier}/${encodeURIComponent(file.name)}`;
                            
                            // Re-creates the original gorgeous rounded dashboard preview card design
                            let card = document.createElement('div');
                            card.className = 'matrix-card p-2 flex flex-col justify-between';
                            card.innerHTML = `
                                <div>
                                    <div class="audio-preview-box">
                                        <i class="fa-solid fa-shield-halved text-white/20 text-2xl absolute opacity-40"></i>
                                        <span class="text-[8px] uppercase tracking-widest text-gray-400 font-bold z-10">Full Audio</span>
                                    </div>
                                    <div class="p-2 min-w-0">
                                        <h3 class="font-bold text-[10px] text-gray-100 truncate line-clamp-2 mb-0.5" title="${title}">${title}</h3>
                                        <p class="text-[9px] text-gold truncate">${artist}</p>
                                    </div>
                                </div>
                                <div class="p-1 mt-2 flex gap-1.5 items-center">
                                    <button onclick="playTrack('${dUrl.replace(/'/g, "\\'")}', '${title.replace(/'/g, "\\'")}', '${artist.replace(/'/g, "\\'")}')" class="flex-1 bg-burnt-orange hover:bg-orange-700 text-white font-bold py-1 px-2 rounded text-[9px] uppercase tracking-wider flex items-center justify-center gap-1 transition">
                                        <i class="fa-solid fa-play text-[7px]"></i> Play
                                    </button>
                                    <button onclick="downloadTrack('${dUrl.replace(/'/g, "\\'")}', '${title.replace(/'/g, "\\'")}', '${artist.replace(/'/g, "\\'")}')" class="p-1 bg-zinc-800 hover:bg-zinc-700 border border-white/10 rounded text-gray-300 transition">
                                        <i class="fa-solid fa-cloud-arrow-down text-[9px]"></i>
                                    </button>
                                </div>
                            `;
                            resultsGrid.appendChild(card);
                        }
                    } catch(err) { continue; }
                }
                if (rendered === 0) noResults.classList.remove('hidden');
            } catch (e) { 
                loading.classList.add('hidden'); 
                noResults.classList.remove('hidden'); 
            }
        }

        function playTrack(url, title, artist) {
            curUrl = url; curTitle = title; curArtist = artist;
            playerName.textContent = title; playerArtist.textContent = artist;
            mainAudio.src = url; playerContainer.classList.remove('hidden');
            mainAudio.play();
        }

        function downloadTrack(url, title, artist) {
            const cleanName = `${title} - ${artist}.mp3`.replace(/[/\\?%*:|"<>]/g, '-');
            const a = document.createElement('a');
            a.href = url; a.target = '_blank'; a.download = cleanName;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        playerDownloadBtn.addEventListener('click', () => { if (curUrl) downloadTrack(curUrl, curTitle, curArtist); });
    </script>
</body>
</html>
