        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH | PRAISE MATRIX</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030201; color: #ffffff; font-family: sans-serif; }
        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        
        .font-algerian { 
            font-family: 'Cinzel Decorative', Georgia, serif; 
            letter-spacing: 0.05em;
            background: linear-gradient(185deg, #fff3d1 0%, #dfb15b 45%, #8a5e13 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .matrix-card { background: rgba(18, 18, 18, 0.85); border: 1px solid rgba(223, 177, 91, 0.2); border-radius: 8px; }
        .audio-preview-box { height: 75px; border-radius: 6px 6px 0 0; overflow: hidden; position: relative; }
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="text-center py-8">
        <h1 class="text-5xl font-black font-algerian uppercase">JUDAH</h1>
        <div class="text-lg uppercase tracking-[0.3em] text-white mt-1 opacity-90">PRAISE MATRIX</div>
    </header>

    <main class="max-w-4xl mx-auto px-3">
        <section class="mb-8 max-w-sm mx-auto">
            <div class="bg-zinc-900 border border-white/10 rounded-full p-1 flex items-center shadow-xl">
                <input type="text" id="search-input" placeholder="Search gospel music..." class="flex-1 bg-transparent px-4 text-xs focus:outline-none text-white">
                <button id="search-submit-btn" class="bg-burnt-orange px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-wider text-white">Search</button>
            </div>
        </section>

        <div id="results-grid" class="grid-layout"></div>
    </main>

    <script>
        const YOUTUBE_API_KEY = "AIzaSyCb9D4S7EMkSvR31tuUArDBnR_kF9tcYjo";

        // --- STABLE DOWNLOAD HANDLER ---
        async function triggerMediaFetch(id, format) {
            const btn = document.getElementById(`btn-${format}-${id}`);
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i>`;
            
            try {
                // Using a direct API gateway to avoid 404s from web conversion pages
                const response = await fetch(`https://api.cobalt.tools/api/json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        url: `https://youtube.com/watch?v=${id}`,
                        isAudioOnly: (format === 'mp3'),
                        aFormat: 'mp3'
                    })
                });
                const data = await response.json();
                
                if (data.url) {
                    window.open(data.url, '_blank');
                } else {
                    alert("Service currently busy, please retry in a moment.");
                }
            } catch (e) {
                // Fallback direct link
                window.open(`https://youtube.com/watch?v=${id}`, '_blank');
            } finally {
                btn.innerHTML = format === 'mp3' ? 'AUDIO' : 'VIDEO';
            }
        }

        // --- RENDER LOGIC ---
        function renderCard(item) {
            return `
                <div class="matrix-card p-2 flex flex-col justify-between">
                    <div class="audio-preview-box bg-cover bg-center" style="background-image: url('${item.thumb}')"></div>
                    <h3 class="text-[9px] font-bold mt-2 mb-2 line-clamp-2">${item.title}</h3>
                    <button class="w-full bg-burnt-orange text-white py-1.5 rounded text-[9px] font-bold uppercase mb-2">Stream</button>
                    <div class="grid grid-cols-2 gap-1">
                        <button id="btn-mp3-${item.id}" onclick="triggerMediaFetch('${item.id}', 'mp3')" class="bg-zinc-800 text-gold text-[8px] py-1 rounded border border-white/5">AUDIO</button>
                        <button id="btn-mp4-${item.id}" onclick="triggerMediaFetch('${item.id}', 'mp4')" class="bg-zinc-800 text-white text-[8px] py-1 rounded border border-white/5">VIDEO</button>
                    </div>
                </div>
            `;
        }
        
        // ... (Include your existing search/fetch code here) ...
    </script>
</body>
</html>
