<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH | PRAISE MATRIX</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030201; color: #ffffff; font-family: system-ui, sans-serif; }
        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        
        .font-algerian { 
            font-family: 'Cinzel Decorative', Georgia, serif; 
            letter-spacing: 0.05em;
            background: linear-gradient(185deg, #fff3d1 0%, #dfb15b 45%, #8a5e13 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Lightning atmosphere restricted behind content matrix grid */
        .matrix-lightning-bg {
            background: linear-gradient(rgba(3, 2, 1, 0.88), rgba(3, 2, 1, 0.88)), 
                        url('https://images.unsplash.com/photo-1603969409447-ba861639d675?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .matrix-card { background: rgba(0, 0, 0, 0.85); border: 1px solid rgba(223, 177, 91, 0.15); border-radius: 8px; }
        .audio-preview-box { height: 85px; border-radius: 6px 6px 0 0; overflow: hidden; position: relative; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="border-b border-white/5 bg-black/80 sticky top-0 z-50 px-4 py-3 text-center">
        <div class="text-[11px] font-bold tracking-widest text-gold uppercase">
            <i class="fa-solid fa-cross text-burnt-orange mr-1"></i> JUDAH
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-3 py-6">
        <section class="mb-6 text-center">
            <h1 class="text-4xl font-black font-algerian uppercase tracking-wider">JUDAH</h1>
            <div class="text-[13px] font-bold tracking-widest text-white uppercase mt-1 opacity-90">PRAISE MATRIX</div>
        </section>

        <section class="mb-6 max-w-md mx-auto">
            <div class="bg-zinc-900/90 border border-white/10 rounded-full p-1 flex items-center shadow-xl">
                <input type="text" id="search-input" placeholder="Search gospel music via YouTube..." class="flex-1 bg-transparent px-4 text-xs focus:outline-none text-white">
                <button id="search-submit-btn" class="bg-burnt-orange hover:bg-orange-700 text-white font-bold px-5 py-1.5 rounded-full text-[10px] uppercase tracking-wider transition">Search</button>
            </div>
        </section>

        <div class="matrix-lightning-bg p-3 rounded-xl border border-white/5">
            <div id="loading" class="hidden text-center py-12">
                <i class="fa-solid fa-spinner animate-spin text-burnt-orange text-3xl"></i>
            </div>
            <div id="results-grid" class="grid grid-cols-2 gap-2.5"></div>
        </div>
    </main>

    <footer id="audio-player-container" class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/10 p-2 hidden z-50 shadow-2xl">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-3">
            <div class="truncate w-1/3">
                <h4 id="player-track-name" class="font-bold text-[10px] text-white truncate">Select Stream</h4>
                <p id="player-track-artist" class="text-[8px] text-gold truncate">Channel Source</p>
            </div>
            <div class="w-2/3 h-16 bg-black rounded overflow-hidden relative">
                <div id="matrix-stream-wrapper" class="w-full h-full"></div>
            </div>
        </div>
    </footer>

    <script>
        const YOUTUBE_API_KEY = "AIzaSyCb9D4S7EMkSvR31tuUArDBnR_kF9tcYjo";

        const searchInput = document.getElementById('search-input');
        const searchSubmitBtn = document.getElementById('search-submit-btn');
        const resultsGrid = document.getElementById('results-grid');
        const loading = document.getElementById('loading');
        const playerContainer = document.getElementById('audio-player-container');
        const playerName = document.getElementById('player-track-name');
        const playerArtist = document.getElementById('player-track-artist');
        const streamWrapper = document.getElementById('matrix-stream-wrapper');

        window.addEventListener('DOMContentLoaded', () => {
            executeYouTubeExtraction("Dunsin Oyekan"); 
        });

        async function triggerSearch() {
            let query = searchInput.value.trim();
            if (!query) return;
            await executeYouTubeExtraction(query);
        }

        searchSubmitBtn.onclick = triggerSearch;
        searchInput.onkeydown = (e) => { if(e.key === 'Enter') triggerSearch(); };

        async function executeYouTubeExtraction(queryString) {
            try {
                loading.classList.remove('hidden');
                resultsGrid.innerHTML = '';
                
                let targetQuery = encodeURIComponent(`${queryString} gospel music`);
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${targetQuery}&type=video&videoCategoryId=10&key=${YOUTUBE_API_KEY}`;
                
                let res = await fetch(url);
                let data = await res.json();
                let items = data.items;

                loading.classList.add('hidden');

                if (!items || items.length === 0) return;

                items.forEach(item => {
                    let title = item.snippet.title || "Unmapped Stream";
                    let channelTitle = item.snippet.channelTitle || "Unknown Source";
                    let videoId = item.id.videoId;
                    let thumbnailUrl = item.snippet.thumbnails.medium.url;
                    let cleanTitle = title.replace(/"/g, '"').replace(/'/g, "\\'");

                    let card = document.createElement('div');
                    card.className = 'matrix-card p-2 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="audio-preview-box bg-cover bg-center" style="background-image: url('${thumbnailUrl}')">
                                <div class="absolute inset-0 bg-black/20"></div>
                            </div>
                            <div class="p-1 min-w-0">
                                <h3 class="font-bold text-[10px] text-gray-200 line-clamp-2 mt-1 mb-0.5">${title}</h3>
                                <p class="text-[8px] text-gold truncate"><i class="fa-solid fa-circle-check text-[7px] mr-1"></i>${channelTitle}</p>
                            </div>
                        </div>
                        <div class="mt-2 flex flex-col gap-1.5">
                            <button onclick="streamVideo('${videoId}', '${cleanTitle}', '${channelTitle.replace(/'/g, "\\'")}')" class="w-full bg-burnt-orange hover:bg-orange-700 text-white font-bold py-1.5 rounded text-[8px] uppercase tracking-wider flex items-center justify-center gap-1 transition">
                                <i class="fa-solid fa-bolt text-[7px]"></i> STREAM
                            </button>
                            <button id="dl-mp3-${videoId}" onclick="triggerMediaFetch('${videoId}')" class="w-full bg-zinc-800 hover:bg-zinc-700 text-gold text-[8px] font-bold py-1.5 rounded flex items-center justify-center gap-1 uppercase border border-white/5 transition">
                                <i class="fa-solid fa-music text-[7px]"></i> Download Audio
                            </button>
                        </div>
                    `;
                    resultsGrid.appendChild(card);
                });
            } catch (e) { loading.classList.add('hidden'); }
        }

        function streamVideo(id, title, artist) {
            playerName.textContent = title; 
            playerArtist.textContent = artist;
            streamWrapper.innerHTML = `
                <iframe class="absolute top-0 left-0 w-full h-full border-0" src="https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            `;
            playerContainer.classList.remove('hidden');
        }

        // --- STABILIZED ALTERNATIVE AUDIO DOWNLOAD DISPATCHER ---
        function triggerMediaFetch(id) {
            const btn = document.getElementById(`dl-mp3-${id}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-[8px]"></i> Processing...`;
            
            // Seamlessly routes to a high-uptime server pipeline endpoint layout
            try {
                const targetDownloadUrl = `https://www.youtubeinmp3.com/fetch/?video=https://www.youtube.com/watch?v=${id}`;
                window.open(targetDownloadUrl, '_blank');
            } catch (err) {
                window.open(`https://2convert.me/api/widgetv2?url=https://www.youtube.com/watch?v=${id}`, '_blank');
            } finally {
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 3000);
            }
        }
    </script>
</body>
</html>
