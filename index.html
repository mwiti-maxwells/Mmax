<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH "PRAISE MATRIX"</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030201; color: #ffffff; font-family: system-ui, sans-serif; }
        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        
        /* Strict Algerian Styling mimicking your stencil sheet */
        .font-algerian { 
            font-family: 'Cinzel Decorative', Georgia, serif; 
            letter-spacing: 0.05em;
            text-shadow: 0px 4px 10px rgba(223, 177, 91, 0.3);
            background: linear-gradient(185deg, #fff3d1 0%, #dfb15b 45%, #8a5e13 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Compact Cards Optimized for Dual Column Grid */
        .matrix-card { background: rgba(18, 18, 18, 0.7); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 8px; transition: all 0.2s; }
        .matrix-card:hover { border-color: #cc5a01; }
        .audio-preview-box { height: 75px; border-radius: 6px 6px 0 0; position: relative; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="border-b border-white/5 bg-black/80 sticky top-0 z-50 px-4 py-2 flex justify-between items-center">
        <div class="mx-auto text-[10px] font-bold tracking-widest text-gray-500 uppercase">
            <i class="fa-solid fa-cross text-burnt-orange mr-1"></i> MAXWELL'S JUDAH "PRAISE MATRIX"
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-3 py-6">
        <section class="mb-6 text-center">
            <h1 class="text-4xl font-black font-algerian tracking-wider uppercase mb-0">JUDAH</h1>
            <div class="text-[13px] font-bold tracking-widest text-white uppercase opacity-90 mt-1">PRAISE MATRIX</div>
        </section>

        <section class="mb-4 max-w-md mx-auto">
            <div class="bg-zinc-900/90 border border-white/10 rounded-full p-1 flex items-center shadow-xl">
                <div class="flex-1 flex items-center px-3">
                    <i class="fa-solid fa-fire text-burnt-orange text-xs mr-2 animate-pulse"></i>
                    <input type="text" id="search-input" placeholder="Search gospel music via YouTube..." class="w-full bg-transparent text-white focus:outline-none text-xs">
                </div>
                <button type="button" id="search-submit-btn" class="bg-burnt-orange hover:bg-orange-700 text-white font-bold px-4 py-1.5 rounded-full text-[10px] uppercase tracking-wider transition">Search</button>
            </div>
        </section>

        <section id="suggestions-box" class="mb-6 max-w-md mx-auto hidden">
            <div class="bg-zinc-900/40 border border-gold/20 rounded-lg p-2 text-center">
                <p class="text-[9px] font-bold tracking-wider text-gold uppercase mb-1.5"><i class="fa-solid fa-star mr-1"></i> Frequent Selections Suggestions</p>
                <div id="suggestions-list" class="flex flex-wrap gap-1.5 justify-center"></div>
            </div>
        </section>

        <div id="loading" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-2 border-t-transparent border-burnt-orange"></div>
        </div>

        <div id="no-results" class="hidden text-center py-8 bg-zinc-900/30 rounded-xl p-4 border border-white/5">
            <p class="text-gray-400 text-xs">No matching frequencies active. Refine sequence criteria.</p>
        </div>

        <div id="results-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2"></div>
    </main>

    <footer id="audio-player-container" class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/10 p-2 hidden z-50 shadow-2xl backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2">
            <div class="flex items-center gap-2 w-full sm:w-1/3 min-w-0">
                <div class="p-1.5 bg-zinc-900 rounded text-burnt-orange flex-shrink-0"><i class="fa-solid fa-compact-disc text-[10px] animate-spin" style="animation-duration: 3s;"></i></div>
                <div class="truncate">
                    <h4 id="player-track-name" class="font-bold text-[10px] truncate text-white">Select Stream</h4>
                    <p id="player-track-artist" class="text-[8px] text-gold truncate">Source Channel</p>
                </div>
            </div>
            <div class="w-full sm:w-2/3 flex justify-end h-16 bg-black rounded border border-white/5 overflow-hidden">
                <div id="matrix-stream-wrapper" class="w-full h-full"></div>
            </div>
        </div>
    </footer>

    <script>
        const YOUTUBE_API_KEY = "AIzaSyCb9D4S7EMkSvR31tuUArDBnR_kF9tcYjo";

        const searchInput = document.getElementById('search-input');
        const searchSubmitBtn = document.getElementById('search-submit-btn');
        const resultsGrid = document.getElementById('results-grid');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('no-results');
        const suggestionsBox = document.getElementById('suggestions-box');
        const suggestionsList = document.getElementById('suggestions-list');
        const playerContainer = document.getElementById('audio-player-container');
        const playerName = document.getElementById('player-track-name');
        const playerArtist = document.getElementById('player-track-artist');
        const streamWrapper = document.getElementById('matrix-stream-wrapper');

        window.addEventListener('DOMContentLoaded', () => {
            trackQueryPersistence("Zoravo");
            executeYouTubeExtraction("Zoravo"); 
        });

        function trackQueryPersistence(query) {
            if (!query) return;
            let history = JSON.parse(localStorage.getItem('matrix_history') || '{}');
            history[query.toLowerCase()] = (history[query.toLowerCase()] || 0) + 1;
            localStorage.setItem('matrix_history', JSON.stringify(history));
            renderSmartSuggestions();
        }

        function renderSmartSuggestions() {
            let history = JSON.parse(localStorage.getItem('matrix_history') || '{}');
            suggestionsList.innerHTML = '';
            let validSuggestions = 0;

            for (let [term, count] of Object.entries(history)) {
                // Persistent Threshold: Trigger strictly if looked up 3 or more times
                if (count >= 3) {
                    validSuggestions++;
                    let pill = document.createElement('button');
                    pill.className = "bg-zinc-800 hover:bg-zinc-700 text-gold text-[9px] font-medium px-2 py-0.5 rounded border border-white/5 truncate max-w-[120px]";
                    pill.textContent = term.toUpperCase();
                    pill.onclick = () => {
                        searchInput.value = term;
                        triggerSearch();
                    };
                    suggestionsList.appendChild(pill);
                }
            }

            if (validSuggestions > 0) {
                suggestionsBox.classList.remove('hidden');
            } else {
                suggestionsBox.classList.add('hidden');
            }
        }

        async function triggerSearch() {
            let query = searchInput.value.trim();
            if (!query) return;

            resultsGrid.innerHTML = '';
            noResults.classList.add('hidden');
            loading.classList.remove('hidden');
            
            trackQueryPersistence(query);
            await executeYouTubeExtraction(query);
        }

        searchSubmitBtn.addEventListener('click', triggerSearch);
        searchInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') triggerSearch(); });

        async function executeYouTubeExtraction(queryString) {
            try {
                loading.classList.remove('hidden');
                noResults.classList.add('hidden');
                
                let targetQuery = encodeURIComponent(`${queryString} gospel music`);
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${targetQuery}&type=video&videoCategoryId=10&key=${YOUTUBE_API_KEY}`;
                
                let res = await fetch(url);
                let data = await res.json();
                let items = data.items;

                loading.classList.add('hidden');
                resultsGrid.innerHTML = '';

                if (!items || items.length === 0) {
                    noResults.classList.remove('hidden');
                    return;
                }

                items.forEach(item => {
                    let title = item.snippet.title || "Unmapped Stream";
                    let channelTitle = item.snippet.channelTitle || "Unknown Source";
                    let videoId = item.id.videoId;
                    let thumbnailUrl = item.snippet.thumbnails.medium.url;
                    let cleanTitle = title.replace(/"/g, '"').replace(/'/g, "'");

                    let card = document.createElement('div');
                    card.className = 'matrix-card p-1.5 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="audio-preview-box bg-cover bg-center" style="background-image: url('${thumbnailUrl}')">
                                <div class="absolute inset-0 bg-black/30"></div>
                                <i class="fa-brands fa-youtube text-red-600 text-xl absolute z-10 opacity-90"></i>
                            </div>
                            <div class="p-1 min-w-0">
                                <h3 class="font-bold text-[10px] text-gray-200 line-clamp-2 mb-0.5" title="${cleanTitle}">${cleanTitle}</h3>
                                <p class="text-[8px] text-gold truncate"><i class="fa-solid fa-circle-check text-[7px] mr-1"></i>${channelTitle}</p>
                            </div>
                        </div>
                        <div class="mt-1 flex flex-col gap-1">
                            <button onclick="streamVideo('${videoId}', '${cleanTitle.replace(/'/g, "\\'")}', '${channelTitle.replace(/'/g, "\\'")}')" class="w-full bg-burnt-orange hover:bg-orange-700 text-white font-bold py-1 px-1.5 rounded text-[8px] uppercase tracking-wider flex items-center justify-center gap-1 transition">
                                <i class="fa-solid fa-bolt text-[7px]"></i> STREAM
                            </button>
                            <div class="grid grid-cols-2 gap-1">
                                <button id="dl-mp3-${videoId}" onclick="triggerMediaFetch('${videoId}', 'mp3')" class="bg-zinc-800 hover:bg-zinc-700 text-gold text-[7px] font-bold py-0.5 px-0.5 rounded flex items-center justify-center gap-0.5 uppercase border border-white/5 transition">
                                    <i class="fa-solid fa-music"></i> Audio
                                </button>
                                <button id="dl-mp4-${videoId}" onclick="triggerMediaFetch('${videoId}', 'mp4')" class="bg-zinc-800 hover:bg-zinc-700 text-white text-[7px] font-bold py-0.5 px-0.5 rounded flex items-center justify-center gap-0.5 uppercase border border-white/5 transition">
                                    <i class="fa-solid fa-video"></i> Video
                                </button>
                            </div>
                        </div>
                    `;
                    resultsGrid.appendChild(card);
                });

            } catch (e) { 
                loading.classList.add('hidden'); 
                noResults.classList.remove('hidden'); 
            }
        }

        function streamVideo(id, title, artist) {
            playerName.textContent = title; 
            playerArtist.textContent = artist;
            streamWrapper.innerHTML = `
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            `;
            playerContainer.classList.remove('hidden');
        }

        function triggerMediaFetch(id, format) {
            // High uptime direct structural gateway paths to avoid local network blocks 
            let routeUrl = (format === 'mp3') 
                ? `https://9xbuddy.in/process?url=https://www.youtube.com/watch?v=${id}`
                : `https://tbvideofb.com/watch?v=${id}`;
            window.open(routeUrl, '_blank');
        }
    </script>
</body>
</html>
