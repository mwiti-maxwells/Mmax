<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH "PRAISE MATRIX"</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #030201;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        /* Pure CSS Rendered Centered Background Torch & Flame Blueprint */
        .torch-container-bg {
            position: fixed;
            top: -5%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            height: 120vh;
            z-index: -2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.08;
        }

        .vector-flame {
            width: 280px;
            height: 350px;
            background: radial-gradient(circle at 50% 80%, #ffcc00 10%, #ff6600 40%, #cc2a01 70%, transparent 90%);
            border-radius: 50% 50% 20% 20% / 70% 70% 40% 40%;
            filter: blur(32px);
            animation: flameFlicker 4s ease-in-out infinite alternate;
        }

        .vector-scepter {
            width: 16px;
            height: 700px;
            background: linear-gradient(90deg, #111111 0%, #2b1a0a 50%, #050505 100%);
            border-radius: 4px;
        }

        .ambient-vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 35%, #030201 95%);
            z-index: -1;
            pointer-events: none;
        }

        @keyframes flameFlicker {
            0% { transform: scale(0.95) rotate(-0.5deg); }
            100% { transform: scale(1.03) rotate(0.5deg); }
        }

        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        .hover-bg-burnt-orange:hover { background-color: #e66501; }
        
        /* Premium Spotify-Inspired Compact Horizontal Track Rows */
        .spotify-row {
            background: rgba(15, 11, 8, 0.55);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .spotify-row:hover {
            background: rgba(204, 90, 1, 0.16);
        }
        audio {
            filter: sepia(50%) saturate(60%) grayscale(100%) contrast(95%) invert(92%);
        }
    </style>
</head>
<body class="min-h-screen font-sans pb-36">

    <div class="torch-container-bg">
        <div class="vector-flame"></div>
        <div class="vector-scepter"></div>
    </div>
    <div class="ambient-vignette"></div>

    <header class="border-b border-white/5 bg-black/85 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 mx-auto md:mx-0">
            <i class="fa-solid fa-cross text-burnt-orange text-lg mr-1 animate-pulse"></i>
            <span class="text-sm md:text-base font-black tracking-widest text-white uppercase">
                maxwell's <span class="text-gold">JUDAH "PRAISE MATRIX"</span>
            </span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 relative z-10">
        
        <section class="mb-10 text-center">
            <h1 class="text-3xl md:text-5xl font-black mb-3 tracking-tight uppercase">
                JUDAH <span class="text-burnt-orange">"PRAISE MATRIX"</span>
            </h1>
            <p class="text-gray-400 max-w-xl mx-auto text-xs md:text-sm tracking-wide">
                Refined search matrix. Downloads map securely to document storage with structural real-name labeling.
            </p>
        </section>

        <section class="mb-10">
            <form id="search-form" onsubmit="return false;" class="bg-zinc-900/95 border border-white/10 rounded-full p-1.5 flex flex-row gap-2 max-w-xl mx-auto shadow-2xl backdrop-blur-md">
                <div class="flex-1 flex items-center bg-transparent px-4">
                    <i class="fa-solid fa-magnifying-glass text-gray-500 mr-3"></i>
                    <input type="text" id="search-input" required placeholder="Search exact track title, artist, or specific choir..." class="w-full bg-transparent text-white focus:outline-none placeholder-gray-600 text-sm md:text-base">
                </div>
                <button type="button" id="search-submit-btn" class="bg-burnt-orange hover-bg-burnt-orange text-white font-bold px-6 py-2.5 rounded-full transition duration-300 shadow-md text-xs uppercase tracking-wider">
                    Search
                </button>
            </form>
        </section>

        <section class="mb-4 px-2 flex items-center justify-between">
            <h2 id="grid-context-title" class="text-xs font-bold uppercase tracking-widest text-gold/80 flex items-center gap-2">
                <i class="fa-solid fa-microchip text-burnt-orange animate-pulse"></i> Initializing Stream Engine...
            </h2>
        </section>

        <div id="loading" class="hidden text-center py-16">
            <div class="inline-block animate-spin rounded-full h-7 w-7 border-t-2 border-b-2 border-burnt-orange mb-3"></div>
            <p class="text-[11px] uppercase tracking-widest text-gold font-semibold">Enforcing strict content protocols...</p>
        </div>

        <div id="no-results" class="hidden text-center py-12 bg-zinc-900/40 border border-white/5 rounded-2xl max-w-md mx-auto p-6 backdrop-blur-sm">
            <i class="fa-solid fa-filter-circle-xmark text-2xl text-burnt-orange mb-3"></i>
            <p class="text-gray-400 text-xs md:text-sm">No verified audio matches found. Refine your query keywords.</p>
        </div>

        <section id="results-grid" class="flex flex-col rounded-xl overflow-hidden shadow-xl border border-white/5">
            </section>
    </main>

    <footer id="audio-player-container" class="fixed bottom-0 left-0 right-0 bg-zinc-950/95 border-t border-white/10 p-4 transform translate-y-full transition-transform duration-300 shadow-2xl hidden z-50 backdrop-blur-lg">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            
            <div class="flex items-center gap-3 w-full md:w-1/3">
                <div class="w-10 h-10 rounded-md bg-burnt-orange/20 border border-burnt-orange/30 flex items-center justify-center text-burnt-orange shadow-inner
