<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH "PRAISE MATRIX"</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #030201; color: #ffffff; font-family: system-ui, sans-serif; }
        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        .matrix-card { background: rgba(18, 18, 18, 0.6); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 12px; transition: all 0.2s; }
        .matrix-card:hover { border-color: #cc5a01; transform: translateY(-2px); }
        .audio-preview-box { background: linear-gradient(135deg, #111, #222); height: 100px; border-radius: 8px 8px 0 0; position: relative; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="border-b border-white/5 bg-black/80 sticky top-0 z-50 px-6 py-3 flex justify-between items-center">
        <div class="mx-auto text-xs font-bold tracking-widest text-gray-400 uppercase">
            <i class="fa-solid fa-cross text-burnt-orange mr-1"></i> MAXWELL'S <span class="text-gold">JUDAH "PRAISE MATRIX"</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <section class="mb-8 text-center">
            <h1 class="text-2xl font-black mb-1 uppercase tracking-tight">JUDAH <span class="text-burnt-orange">"PRAISE MATRIX"</span></h1>
            <p class="text-gray-400 text-[11px]">Synchronized with Google & YouTube Broadcast Streams.</p>
        </section>

        <section class="mb-8 max-w-xl mx-auto">
            <div class="bg-zinc-900/90 border border-white/10 rounded-full p-1 flex items-center shadow-xl">
                <div class="flex-1 flex items-center px-4">
                    <i class="fa-solid fa-fire text-burnt-orange mr-2 animate-pulse"></i>
                    <input type="text" id="search-input" placeholder="Search gospel music via YouTube..." class="w-full bg-transparent text-white focus:outline-none text-xs">
                </div>
                <button type="button" id="search-submit-btn" class="bg-burnt-orange hover:bg-orange-700 text-white font-bold px-5 py-2 rounded-full text-[10px] uppercase tracking-wider transition">Search</button>
            </div>
        </section>

        <section class="mb-4 px-1">
            <h2 id="grid-context-title" class="text-[11px] font-bold uppercase tracking-widest text-gold flex items-center gap-2">
                <i class="fa-solid fa-magnifying-glass text-xs"></i> Scanning Global Data Streams...
            </h2>
        </section>

        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-t-transparent border-burnt-orange mb-3"></div>
            <p class="text-[10px] tracking-widest text-gold uppercase">Intercepting YouTube Signals...</p>
        </div>

        <div id="no-results" class="hidden text-center py-12 bg-zinc-900/30 rounded-xl max-w-md mx-auto p-6 border border-white/5">
            <p class="text-gray-400 text-xs">No gospel sequences found on this frequency. Try another query.</p>
        </div>

        <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <footer id="audio-player-container" class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/10 p-3 hidden z-50 shadow-2xl backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
            <div class="flex items-center gap-2 w-full sm:w-1/3 min-w-0">
                <div class="p-2 bg-zinc-900 rounded-lg text-burnt-orange"><i class="fa-solid fa-compact-disc text-xs animate-spin" style="animation-duration: 3s;"></i></div>
                <div class="truncate">
                    <h4 id="player-track-name" class="font-bold text-[11px] truncate text-white">Select a Track</h4>
                    <p id="player-track-artist" class="text-[9px] text-gold truncate">Channel Source</p>
                </div>
            </div>
            <div class="w-full sm:w-2/3 flex justify-end h-20 bg-black rounded border border-white/5 overflow-hidden">
                <div id="matrix-stream-wrapper" class="w-full h-full">
                    </div>
            </div>
        </div>
    </footer>

    <script>
        // Your live API Key integration is complete
        const YOUTUBE_API_KEY = "AIzaSyCb9D4S7EMkSvR31tuUArDBnR_kF9tcYjo";

        const searchInput = document.getElementById('search-input');
        const searchSubmitBtn = document.getElementById('search-submit-btn');
        const resultsGrid = document.getElementById('results-grid');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('no-results');
        const gridContextTitle = document.getElementById('grid-context-title');
        const playerContainer = document.getElementById('audio-player-container');
        const playerName = document.getElementById('player-track-name');
        const playerArtist = document.getElementById('player-track-artist');
        const streamWrapper = document.getElementById('matrix-stream-wrapper');

        window.addEventListener('DOMContentLoaded', () => {
            executeYouTubeExtraction("Zoravo"); 
        });

        async function triggerSearch() {
            let query = searchInput.value.trim();
            if (!query) return;

            gridContextTitle.textContent = `Search Results: "${query.toUpperCase()}"`;
            resultsGrid.innerHTML = '';
            noResults.classList.add('hidden');
            loading.classList.remove('hidden');
            await executeYouTubeExtraction(query);
        }

        searchSubmitBtn.addEventListener('click', triggerSearch);
        searchInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') triggerSearch(); });

        async function executeYouTubeExtraction(queryString) {
            try {
                loading.classList.remove('hidden');
                noResults.classList.add('hidden');
                
                let targetQuery = encodeURIComponent(`${queryString} gospel music`);
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${targetQuery}&type=video&videoCategoryId=10&key=${YOUTUBE_API_KEY}`;
                
                let res = await fetch(url);
                let data = await res.json();
                let items = data.items;

                loading.classList.add('hidden');
                resultsGrid.innerHTML = '';

                if (!items || items.length === 0) {
                    noResults.classList.remove('hidden');
                    return;
                }

                items.forEach(item => {
                    let title = item.snippet.title || "Unmapped Stream";
                    let channelTitle = item.snippet.channelTitle || "Unknown Source";
                    let videoId = item.id.videoId;
                    let thumbnailUrl = item.snippet.thumbnails.medium.url;

                    let cleanTitle = title.replace(/"/g, '"').replace(/'/g, "'");

                    let card = document.createElement('div');
                    card.className = 'matrix-card p-2 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="audio-preview-box bg-cover bg-center" style="background-image: url('${thumbnailUrl}')">
                                <div class="absolute inset-0 bg-black/40"></div>
                                <i class="fa-brands fa-youtube text-red-600 text-3xl absolute z-10 opacity-90"></i>
                            </div>
                            <div class="p-2 min-w-0">
                                <h3 class="font-bold text-[11px] text-gray-100 line-clamp-2 mb-0.5" title="${cleanTitle}">${cleanTitle}</h3>
                                <p class="text-[9px] text-gold truncate"><i class="fa-solid fa-circle-check text-[8px] mr-1"></i>${channelTitle}</p>
                            </div>
                        </div>
                        <div class="p-1 mt-2 flex flex-col gap-1.5">
                            <button onclick="streamVideo('${videoId}', '${cleanTitle.replace(/'/g, "\\'")}', '${channelTitle.replace(/'/g, "\\'")}')" class="w-full bg-burnt-orange hover:bg-orange-700 text-white font-bold py-1.5 px-2 rounded text-[9px] uppercase tracking-wider flex items-center justify-center gap-1 transition">
                                <i class="fa-solid fa-bolt text-[8px]"></i> Feed Stream
                            </button>
                            <div class="grid grid-cols-2 gap-1">
                                <button onclick="triggerPayloadDownload('${videoId}', 'mp3')" class="bg-zinc-800 hover:bg-zinc-700 text-gold text-[8px] font-bold py-1 px-1 rounded flex items-center justify-center gap-1 uppercase tracking-tighter border border-white/5 transition">
                                    <i class="fa-solid fa-music"></i> Audio
                                </button>
                                <button onclick="triggerPayloadDownload('${videoId}', 'mp4')" class="bg-zinc-800 hover:bg-zinc-700 text-white text-[8px] font-bold py-1 px-1 rounded flex items-center justify-center gap-1 uppercase tracking-tighter border border-white/5 transition">
                                    <i class="fa-solid fa-video"></i> Video
                                </button>
                            </div>
                        </div>
                    `;
                    resultsGrid.appendChild(card);
                });

            } catch (e) { 
                loading.classList.add('hidden'); 
                noResults.classList.remove('hidden'); 
            }
        }

        function streamVideo(id, title, artist) {
            playerName.textContent = title; 
            playerArtist.textContent = artist;
            streamWrapper.innerHTML = `
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            `;
            playerContainer.classList.remove('hidden');
        }

        function triggerPayloadDownload(id, format) {
            let gatewayUrl = `https://9xbuddy.xyz/process?url=https://www.youtube.com/watch?v=${id}`;
            if(format === 'mp3') {
                gatewayUrl = `https://www.y2mate.com/youtube/${id}`;
            }
            window.open(gatewayUrl, '_blank');
        }
    </script>
</body>
</html>
