<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMax - Stream & Download Music</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.0.0-alpha.4/dist/index.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen font-sans">

    <header class="border-b border-gray-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">MMax</span>
        </div>
        <div class="text-xs text-gray-400 bg-slate-800 px-3 py-1.5 rounded-full border border-gray-700">
            Global Access Enabled
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <section class="mb-12 text-center">
            <h1 class="text-4xl font-extrabold mb-4 tracking-tight">Discover Music Anywhere.</h1>
            <p class="text-gray-400 max-w-xl mx-auto mb-8 text-sm">Search millions of tracks, filter by your region, listen instantly, or download straight to your drive.</p>
            
            <form id="search-form" class="glass-card p-2 rounded-2xl flex flex-col gap-2 max-w-3xl mx-auto shadow-2xl">
                <div class="flex items-center bg-slate-800/80 rounded-xl px-3 py-2 border border-gray-700/50">
                    <select id="country-select" class="bg-transparent text-sm text-gray-200 focus:outline-none cursor-pointer pr-4 w-full">
                        <option value="KE" class="bg-slate-950">Kenya</option>
                        <option value="US" class="bg-slate-950">United States</option>
                        <option value="GB" class="bg-slate-950">United Kingdom</option>
                        <option value="ZA" class="bg-slate-950">South Africa</option>
                        <option value="IN" class="bg-slate-950">India</option>
                    </select>
                </div>
                
                <div class="flex-1 flex items-center bg-transparent px-3 py-2">
                    <input type="text" id="search-input" required placeholder="Search songs or artists..." class="w-full bg-transparent text-gray-100 focus:outline-none placeholder-gray-500 text-lg">
                </div>
                
                <button type="submit" class="bg-gradient-to-r from-indigo-500 to-cyan-500 text-white font-semibold px-8 py-3 rounded-xl active:scale-95">
                    Search
                </button>
            </form>
        </section>

        <div id="loading" class="hidden text-center py-12">
            <p class="text-gray-400 animate-pulse">Tuning into local servers...</p>
        </div>
        <div id="no-results" class="hidden text-center py-12 glass-card rounded-2xl max-w-md mx-auto">
            <p class="text-gray-400">No tracks found. Try switching your location!</p>
        </div>

        <section id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </section>
    </main>

    <footer id="audio-player-container" class="fixed bottom-0 left-0 right-0 glass-card border-t border-gray-800 p-4 transform translate-y-full transition-transform duration-300 shadow-2xl bg-slate-950/90 hidden z-50">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-full sm:w-1/3">
                <img id="player-track-art" src="" alt="" class="w-12 h-12 rounded-lg object-cover bg-gray-800">
                <div class="overflow-hidden">
                    <h4 id="player-track-name" class="font-bold text-sm truncate text-white">Song</h4>
                    <p id="player-track-artist" class="text-xs text-gray-400 truncate">Artist</p>
                </div>
            </div>
            <div class="w-full sm:w-1/3 flex justify-center">
                <audio id="main-audio-element" controls class="w-full max-w-md h-10"></audio>
            </div>
            <div class="w-full sm:w-1/3 flex justify-end">
                <a id="player-download-btn" href="#" download target="_blank" class="bg-slate-800 border border-gray-700 text-xs font-semibold px-4 py-2 rounded-xl text-cyan-400">
                    Download File
                </a>
            </div>
        </div>
    </footer>

    <script>
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const countrySelect = document.getElementById('country-select');
        const resultsGrid = document.getElementById('results-grid');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('no-results');
        const playerContainer = document.getElementById('audio-player-container');
        const mainAudio = document.getElementById('main-audio-element');
        const playerArt = document.getElementById('player-track-art');
        const playerName = document.getElementById('player-track-name');
        const playerArtist = document.getElementById('player-track-artist');
        const playerDownloadBtn = document.getElementById('player-download-btn');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = encodeURIComponent(searchInput.value.trim());
            const country = countrySelect.value;
            
            resultsGrid.innerHTML = '';
            noResults.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${query}&country=${country}&media=music&limit=24`);
                const data = await response.json();
                loading.classList.add('hidden');

                if (data.results.length === 0) {
                    noResults.classList.remove('hidden');
                    return;
                }

                data.results.forEach(track => {
                    const artworkUrl = track.artworkUrl100.replace('100x100bb.jpg', '400x400bb.jpg');
                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-2xl p-4 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <img src="${artworkUrl}" class="w-full aspect-square object-cover rounded-xl mb-4">
                            <h3 class="font-bold text-base truncate text-white">${track.trackName}</h3>
                            <p class="text-xs text-gray-400 truncate mb-2">${track.artistName}</p>
                        </div>
                        <div class="mt-4 pt-3 border-t border-gray-800/60 flex gap-2">
                            <button onclick="playTrack('${track.previewUrl}', '${track.trackName.replace(/'/g, "\\'")}', '${track.artistName.replace(/'/g, "\\'")}', '${artworkUrl}')" class="flex-1 py-2 rounded-xl bg-indigo-600 text-white text-xs font-semibold">Listen</button>
                            <a href="${track.previewUrl}" download="${track.trackName}.mp3" target="_blank" class="px-3 py-2 rounded-xl bg-slate-800 text-gray-300 text-xs font-semibold flex items-center justify-center">↓</a>
                        </div>
                    `;
                    resultsGrid.appendChild(card);
                });
            } catch (err) {
                loading.classList.add('hidden');
                alert("Network error. Try again.");
            }
        });

        function playTrack(url, name, artist, art) {
            if (!url) return alert("Preview unavailable.");
            playerArt.src = art;
            playerName.textContent = name;
            playerArtist.textContent = artist;
            playerDownloadBtn.href = url;
            playerDownloadBtn.setAttribute('download', `${name}.mp3`);
            mainAudio.src = url;
            playerContainer.classList.remove('hidden');
            setTimeout(() => playerContainer.classList.remove('translate-y-full'), 50);
            mainAudio.play();
        }
    </script>
</body>
                  </html>
