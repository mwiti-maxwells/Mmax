<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH "PRAISE MATRIX"</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030201; color: #ffffff; font-family: system-ui, sans-serif; }
        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        
        .font-algerian { 
            font-family: 'Cinzel Decorative', Georgia, serif; 
            letter-spacing: 0.05em;
            background: linear-gradient(185deg, #fff3d1 0%, #dfb15b 45%, #8a5e13 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Lightning atmosphere restricted to content area */
        .matrix-lightning-bg {
            background: linear-gradient(rgba(3, 2, 1, 0.85), rgba(3, 2, 1, 0.85)), 
                        url('https://images.unsplash.com/photo-1603969409447-ba861639d675?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
        }

        .matrix-card { background: rgba(0, 0, 0, 0.85); border: 1px solid rgba(223, 177, 91, 0.15); border-radius: 8px; }
        .audio-preview-box { height: 75px; border-radius: 6px 6px 0 0; overflow: hidden; position: relative; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="border-b border-white/5 bg-black/80 sticky top-0 z-50 px-4 py-3 text-center">
        <div class="text-[9px] font-bold tracking-widest text-gray-500 uppercase">
            <i class="fa-solid fa-cross text-burnt-orange mr-1"></i> MAXWELL'S JUDAH "PRAISE MATRIX"
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-3 py-6">
        <section class="mb-8 text-center">
            <h1 class="text-4xl font-black font-algerian uppercase">JUDAH</h1>
            <div class="text-[13px] font-bold tracking-widest text-white uppercase mt-1">PRAISE MATRIX</div>
        </section>

        <section class="mb-6 max-w-md mx-auto">
            <div class="bg-zinc-900/90 border border-white/10 rounded-full p-1 flex items-center shadow-xl">
                <input type="text" id="search-input" placeholder="Search gospel music..." class="flex-1 bg-transparent px-4 text-xs focus:outline-none">
                <button id="search-submit-btn" class="bg-burnt-orange px-5 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider">Search</button>
            </div>
        </section>

        <section id="suggestions-box" class="mb-6 hidden text-center">
            <p class="text-[8px] text-gold uppercase mb-2 font-bold tracking-widest">Frequent Selections</p>
            <div id="suggestions-list" class="flex flex-wrap gap-2 justify-center"></div>
        </section>

        <div class="matrix-lightning-bg p-3 rounded-xl border border-white/5">
            <div id="loading" class="hidden text-center py-10"><i class="fa-solid fa-spinner animate-spin text-burnt-orange text-2xl"></i></div>
            <div id="results-grid" class="grid grid-cols-2 gap-3"></div>
        </div>
    </main>

    <script>
        const YOUTUBE_API_KEY = "AIzaSyCb9D4S7EMkSvR31tuUArDBnR_kF9tcYjo";
        
        // --- Persistence Logic ---
        function trackQuery(query) {
            let history = JSON.parse(localStorage.getItem('matrix_history') || '{}');
            history[query.toLowerCase()] = (history[query.toLowerCase()] || 0) + 1;
            localStorage.setItem('matrix_history', JSON.stringify(history));
            renderSuggestions();
        }

        function renderSuggestions() {
            const list = document.getElementById('suggestions-list');
            const box = document.getElementById('suggestions-box');
            let history = JSON.parse(localStorage.getItem('matrix_history') || '{}');
            list.innerHTML = '';
            let count = 0;
            for(let [term, hits] of Object.entries(history)) {
                if(hits >= 3) {
                    count++;
                    const btn = document.createElement('button');
                    btn.className = "bg-zinc-800 text-gold text-[9px] px-2 py-1 rounded border border-white/10";
                    btn.textContent = term.toUpperCase();
                    btn.onclick = () => { document.getElementById('search-input').value = term; triggerSearch(); };
                    list.appendChild(btn);
                }
            }
            box.classList.toggle('hidden', count === 0);
        }

        // --- Core Extraction ---
        async function triggerSearch() {
            const query = document.getElementById('search-input').value;
            if(!query) return;
            trackQuery(query);
            // ... (Your extraction logic here)
        }

        document.getElementById('search-submit-btn').onclick = triggerSearch;
    </script>
</body>
</html>
