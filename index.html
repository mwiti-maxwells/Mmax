<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH "PRAISE MATRIX"</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #030201; color: #ffffff; }
        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        .spotify-row { background: rgba(15, 11, 8, 0.55); border-bottom: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.2s; }
        .spotify-row:hover { background: rgba(204, 90, 1, 0.16); }
        audio { filter: sepia(50%) invert(92%); }
    </style>
</head>
<body class="min-h-screen pb-36">

    <header class="border-b border-white/5 bg-black/85 sticky top-0 z-50 px-6 py-4 flex justify-between">
        <div class="mx-auto text-sm font-black tracking-widest uppercase">
            MAXWELL'S <span class="text-gold">JUDAH "PRAISE MATRIX"</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <section class="mb-10 text-center">
            <h1 class="text-3xl font-black mb-2 uppercase">JUDAH <span class="text-burnt-orange">"PRAISE MATRIX"</span></h1>
            <p class="text-gray-400 text-xs">Downloads map securely to document storage with real-name labeling.</p>
        </section>

        <section class="mb-10">
            <div class="bg-zinc-900 border border-white/10 rounded-full p-1.5 flex gap-2 max-w-xl mx-auto shadow-2xl">
                <div class="flex-1 flex items-center px-4">
                    <i class="fa-solid fa-magnifying-glass text-gray-500 mr-3"></i>
                    <input type="text" id="search-input" placeholder="Search track, artist, or specific choir..." class="w-full bg-transparent text-white focus:outline-none text-sm">
                </div>
                <button type="button" id="search-submit-btn" class="bg-burnt-orange text-white font-bold px-6 py-2.5 rounded-full text-xs uppercase">Search</button>
            </div>
        </section>

        <section class="mb-4 px-2">
            <h2 id="grid-context-title" class="text-xs font-bold uppercase tracking-widest text-gold/80 flex items-center gap-2">Connecting Matrix Portal...</h2>
        </section>

        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-t-2 border-burnt-orange mb-2"></div>
            <p class="text-[10px] tracking-widest text-gold">Extracting audio payloads...</p>
        </div>

        <div id="no-results" class="hidden text-center py-12 bg-zinc-900/40 rounded-2xl max-w-md mx-auto p-6">
            <p class="text-gray-400 text-xs">No audio matches found. Try shortening your search words.</p>
        </div>

        <section id="results-grid" class="flex flex-col rounded-xl overflow-hidden border border-white/5"></section>
    </main>

    <footer id="audio-player-container" class="fixed bottom-0 left-0 right-0 bg-zinc-950/95 border-t border-white/10 p-4 hidden z-50">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-full md:w-1/3 overflow-hidden">
                <div>
                    <h4 id="player-track-name" class="font-bold text-xs truncate text-white w-48">Song</h4>
                    <p id="player-track-artist" class="text-[10px] text-gold truncate w-48">Artist</p>
                </div>
            </div>
            <div class="w-full md:w-1/3 flex justify-center"><audio id="main-audio-element" controls class="w-full"></audio></div>
            <div class="w-full md:w-1/3 flex justify-end">
                <button id="player-download-btn" class="w-full md:w-auto bg-burnt-orange text-white text-xs font-bold px-4 py-2 rounded-lg">Save Document File</button>
            </div>
        </div>
    </footer>
        <script>
        const searchInput = document.getElementById('search-input');
        const searchSubmitBtn = document.getElementById('search-submit-btn');
        const resultsGrid = document.getElementById('results-grid');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('no-results');
        const gridContextTitle = document.getElementById('grid-context-title');
        const playerContainer = document.getElementById('audio-player-container');
        const mainAudio = document.getElementById('main-audio-element');
        const playerName = document.getElementById('player-track-name');
        const playerArtist = document.getElementById('player-track-artist');
        const playerDownloadBtn = document.getElementById('player-download-btn');

        let curUrl = '', curTitle = '', curArtist = '';

        window.addEventListener('DOMContentLoaded', () => {
            executeMatrixDataExtraction("Eunice Njeri");
        });

        async function triggerSearch() {
            let query = searchInput.value.trim();
            if (!query) return;
            
            // Clean out local device prefixes if users add "Ayala" natively
            if(query.toLowerCase().includes("ayala")) {
                query = query.toLowerCase().replace("ayala", "").trim();
            }

            gridContextTitle.textContent = `Searching: ${query}`;
            resultsGrid.innerHTML = '';
            noResults.classList.add('hidden');
            loading.classList.remove('hidden');
            await executeMatrixDataExtraction(query);
        }

        searchSubmitBtn.addEventListener('click', triggerSearch);
        searchInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') triggerSearch(); });

        async function executeMatrixDataExtraction(queryString) {
            try {
                loading.classList.remove('hidden');
                noResults.classList.add('hidden');
                
                const clean = queryString.toLowerCase().trim();
                let words = clean.split(/\s+/).filter(w => w.length > 1 && w !== "and" && w !== "the");
                
                // Formulate target query matching gospel tags natively
                let expr = words.length > 1 ? words.map(w => `(title:${w}* OR creator:${w}*)`).join(' AND ') : `(title:${encodeURIComponent(queryString)}* OR creator:${encodeURIComponent(queryString)}*)`;
                
                // Hardened structural guardrails against non-music files
                const exclusions = `-subject:(podcast) AND -title:(show) AND -subject:(poem) AND -subject:(poetry) AND -subject:(forum) AND -title:(episode)`;
                
                let url = `https://archive.org/advancedsearch.php?q=(${expr}) AND mediatype:(audio) AND (${exclusions})&fl[]=identifier,title,creator&sort[]=downloads+desc&output=json&rows=30`;
                
                let res = await fetch(url);
                let data = await res.json();
                let items = data.response.docs;

                // Fallback loop handling composite names cleanly 
                if ((!items || items.length === 0) && words.length > 1) {
                    let fallbackPhrase = `${words[0]} ${words[1]}`; // e.g. "eunice njeri"
                    let fallbackUrl = `https://archive.org/advancedsearch.php?q=(title:(${encodeURIComponent(fallbackPhrase)})* OR creator:(${encodeURIComponent(fallbackPhrase)})*) AND mediatype:(audio) AND (${exclusions})&fl[]=identifier,title,creator&sort[]=downloads+desc&output=json&rows=20`;
                    res = await fetch(fallbackUrl);
                    data = await res.json();
                    items = data.response.docs;
                }

                loading.classList.add('hidden');
                resultsGrid.innerHTML = '';

                if (!items || items.length === 0) {
                    noResults.classList.remove('hidden');
                    gridContextTitle.textContent = "Matrix Stream Empty";
                    return;
                }

                gridContextTitle.textContent = `Verified Tracks Found`;
                let rendered = 0;

                for (let item of items) {
                    let title = item.title || "Unmapped Track";
                    let artist = item.creator || "Gospel Artist";
                    let tLow = title.toLowerCase();
                    let aLow = artist.toLowerCase();
                    
                    // Filter out international chatter and broken forum dumps dynamically
                    if (tLow.includes("episode") || tLow.includes("poem") || tLow.includes("various") || aLow.includes("forum") || tLow.includes("forum")) continue;

                    try {
                        let metaRes = await fetch(`https://archive.org/metadata/${item.identifier}`);
                        let metaData = await metaRes.json();
                        let file = metaData.files.find(f => f.name.endsWith('.mp3') && !f.name.includes('vbr') && parseFloat(f.size) > 1500000);
                        
                        if (file) {
                            rendered++;
                            let dUrl = `https://archive.org/download/${item.identifier}/${encodeURIComponent(file.name)}`;
                            let row = document.createElement('div');
                            row.className = 'spotify-row px-4 py-3 flex items-center justify-between gap-4';
                            row.innerHTML = `
                                <div class="flex items-center gap-3 min-w-0 flex-1">
                                    <button onclick="playTrack('${dUrl.replace(/'/g, "\\'")}', '${title.replace(/'/g, "\\'")}', '${artist.replace(/'/g, "\\'")}')" class="w-8 h-8 rounded-full bg-white/5 hover:bg-burnt-orange text-white flex items-center justify-center flex-shrink-0">
                                        <i class="fa-solid fa-play text-[10px]"></i>
                                    </button>
                                    <div class="truncate">
                                        <div class="font-medium text-xs text-gray-100 truncate">${title}</div>
                                        <div class="text-[10px] text-gray-400 truncate">${artist}</div>
                                    </div>
                                </div>
                                <button onclick="downloadTrack('${dUrl.replace(/'/g, "\\'")}', '${title.replace(/'/g, "\\'")}', '${artist.replace(/'/g, "\\'")}')" class="p-2 text-gray-400 hover:text-burnt-orange">
                                    <i class="fa-solid fa-cloud-arrow-down text-xs"></i>
                                </button>
                            `;
                            resultsGrid.appendChild(row);
                        }
                    } catch(err) { continue; }
                }
                if (rendered === 0) noResults.classList.remove('hidden');
            } catch (e) { 
                loading.classList.add('hidden'); 
                noResults.classList.remove('hidden'); 
            }
        }

        function playTrack(url, title, artist) {
            curUrl = url; curTitle = title; curArtist = artist;
            playerName.textContent = title; playerArtist.textContent = artist;
            mainAudio.src = url; playerContainer.classList.remove('hidden');
            mainAudio.play();
        }

        function downloadTrack(url, title, artist) {
            const cleanName = `${title} - ${artist}.mp3`.replace(/[/\\?%*:|"<>]/g, '-');
            const a = document.createElement('a');
            a.href = url; a.target = '_blank'; a.download = cleanName;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        playerDownloadBtn.addEventListener('click', () => { if (curUrl) downloadTrack(curUrl, curTitle, curArtist); });
    </script>
</body>
</html>
