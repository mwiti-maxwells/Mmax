<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUDAH "PRAISE MATRIX"</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030201; color: #ffffff; font-family: system-ui, sans-serif; }
        .text-gold { color: #dfb15b; }
        .text-burnt-orange { color: #cc5a01; }
        .bg-burnt-orange { background-color: #cc5a01; }
        
        /* Atmospheric lightning layer behind icons */
        .matrix-bg {
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'), 
                              linear-gradient(rgba(3, 2, 1, 0.8), rgba(3, 2, 1, 0.8)),
                              url('https://images.unsplash.com/photo-1603969409447-ba861639d675?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-attachment: fixed;
        }

        .font-algerian { font-family: 'Cinzel Decorative', serif; }

        .matrix-card { background: rgba(18, 18, 18, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; }
        .audio-preview-box { height: 80px; border-radius: 6px 6px 0 0; overflow: hidden; position: relative; }
    </style>
</head>
<body class="matrix-bg min-h-screen pb-32">

    <main class="max-w-4xl mx-auto px-3 py-6">
        <section class="mb-6 text-center">
            <h1 class="text-4xl font-black font-algerian text-gold uppercase">JUDAH</h1>
            <div class="text-[12px] font-bold tracking-[0.2em] uppercase mt-1">PRAISE MATRIX</div>
        </section>

        <section class="mb-6 max-w-md mx-auto">
            <div class="bg-zinc-900/90 border border-white/10 rounded-full p-1 flex items-center">
                <input type="text" id="search-input" placeholder="Search..." class="flex-1 bg-transparent px-4 py-1 text-xs focus:outline-none">
                <button id="search-submit-btn" class="bg-burnt-orange px-4 py-1.5 rounded-full text-[10px] uppercase font-bold">Search</button>
            </div>
        </section>

        <div id="results-grid" class="grid grid-cols-2 gap-3"></div>
    </main>

    <script>
        const YOUTUBE_API_KEY = "AIzaSyCb9D4S7EMkSvR31tuUArDBnR_kF9tcYjo";
        // ... (Keep your existing search logic) ...
        
        // Helper to generate Card with new "STREAM" labeling
        function createCard(item) {
            return `
                <div class="matrix-card p-1.5 flex flex-col">
                    <div class="audio-preview-box bg-cover bg-center" style="background-image: url('${item.thumb}')"></div>
                    <div class="p-1">
                        <h3 class="text-[9px] font-bold truncate">${item.title}</h3>
                    </div>
                    <button onclick="streamVideo('${item.id}')" class="mt-auto w-full bg-burnt-orange text-white py-1.5 rounded text-[9px] font-bold uppercase">
                        Stream
                    </button>
                    <div class="grid grid-cols-2 gap-1 mt-1">
                        <button onclick="download('${item.id}', 'mp3')" class="bg-zinc-800 text-gold text-[7px] py-0.5 rounded border border-white/5">Audio</button>
                        <button onclick="download('${item.id}', 'mp4')" class="bg-zinc-800 text-white text-[7px] py-0.5 rounded border border-white/5">Video</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
